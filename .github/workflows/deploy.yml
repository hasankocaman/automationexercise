name: Test & Deploy LearnQA.dev to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_ENABLE_PREMIUM: ${{ secrets.VITE_ENABLE_PREMIUM }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify test credentials (safe hash check — no plaintext)
        run: |
          echo "TEST_USER_EMAIL length: ${#TEST_USER_EMAIL}"
          echo "TEST_USER_PASSWORD length: ${#TEST_USER_PASSWORD}"
          echo "TEST_USER_EMAIL sha256: $(printf '%s' "$TEST_USER_EMAIL" | sha256sum | cut -d' ' -f1)"
          echo "TEST_USER_PASSWORD sha256: $(printf '%s' "$TEST_USER_PASSWORD" | sha256sum | cut -d' ' -f1)"
          echo "VITE_SUPABASE_URL sha256: $(printf '%s' "$VITE_SUPABASE_URL" | sha256sum | cut -d' ' -f1)"
          echo "VITE_SUPABASE_PUBLISHABLE_KEY sha256: $(printf '%s' "$VITE_SUPABASE_PUBLISHABLE_KEY" | sha256sum | cut -d' ' -f1)"

      - name: Live Supabase login probe from CI runner (safe — no token/secret printed)
        run: |
          HTTP_CODE=$(curl -s -o /tmp/probe.json -w "%{http_code}" -X POST "$VITE_SUPABASE_URL/auth/v1/token?grant_type=password" \
            -H "apikey: $VITE_SUPABASE_PUBLISHABLE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$TEST_USER_EMAIL\",\"password\":\"$TEST_USER_PASSWORD\"}")
          echo "HTTP_CODE=$HTTP_CODE"
          node -e "
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('/tmp/probe.json', 'utf8'));
            if (r.access_token) {
              console.log('PROBE_RESULT: LOGIN_OK');
              console.log('user_id:', r.user.id);
              console.log('email_confirmed_at:', r.user.email_confirmed_at);
            } else {
              console.log('PROBE_RESULT: LOGIN_FAILED');
              console.log('error_code:', r.error_code || r.code || '(none)');
              console.log('msg:', r.msg || r.error_description || r.message || '(none)');
            }
          "

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Build (SEO + content integrity + interview audit gate)
        run: npm run build

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload test-results (traces/screenshots/videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_ENABLE_PREMIUM: ${{ secrets.VITE_ENABLE_PREMIUM }}
        run: npm run build

      - name: Prepare GitHub Pages compatibility files
        run: |
          cp dist/index.html dist/404.html
          test -f dist/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
