name: Redirect to learnqa.dev

on:
  push:
    branches: "main"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Create redirect page
        run: |
          mkdir -p dist
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="tr">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=https://learnqa.dev">
            <title>learnqa.dev</title>
            <script>window.location.replace('https://learnqa.dev');</script>
            <style>
              body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #1A1816; color: #fff; }
              a { color: #7c3aed; }
            </style>
          </head>
          <body>
            <p>Yönlendiriliyor → <a href="https://learnqa.dev">learnqa.dev</a></p>
          </body>
          </html>
          EOF
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
